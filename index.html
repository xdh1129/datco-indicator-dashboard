<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAT.co 投資指標儀表板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            padding: 2rem;
            display: flex;
            justify-content: center;
            margin: 0;
        }
        .dashboard-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            padding: 2rem;
            width: 100%;
            max-width: 1000px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #1a1a1a;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .chart-switcher {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .chart-toggle {
            border: 1px solid #d9dfe8;
            background: #fff;
            color: #334155;
            border-radius: 999px;
            padding: 0.55rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .chart-toggle:hover {
            border-color: #94a3b8;
        }
        .chart-toggle.active {
            background: #1f2937;
            color: #fff;
            border-color: #1f2937;
        }
        #chart {
            width: 100%;
            height: 360px;
            margin-bottom: 0.75rem;
        }
        .ai-insight-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #f8f9fa;
            border-left: 4px solid #5470c6;
            border-radius: 4px;
        }
        .ai-insight-box h3 {
            margin-top: 0;
            color: #1a1a1a;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #ai-insight {
            line-height: 1.6;
            color: #444;
            margin-bottom: 0;
            white-space: pre-wrap; /* 保留 API 回傳的換行格式 */
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>MicroStrategy (MSTR) mNAV 與 BTC 趨勢</h1>
        
        <div class="chart-switcher">
            <button type="button" class="chart-toggle active" data-view="mnav">mNAV + BTC</button>
            <button type="button" class="chart-toggle" data-view="mnavPremium">Premium mNAV + BTC</button>
        </div>
        <div id="chart">載入數據中，請確認後端 API 已啟動...</div>

        <div class="ai-insight-box">
            <h3>🤖 AI 趨勢洞察</h3>
            <p id="ai-insight">正在分析近期數據趨勢，請稍候...</p>
        </div>
    </div>

    <script>
        async function fetchAndRenderChart() {
            let indicatorData = [];
            let chart;

            // ==========================================
            // 1. 獲取指標數據並繪製圖表
            // ==========================================
            try {
                const response = await fetch('/api/indicator-data');
                if (!response.ok) throw new Error('網路回應錯誤');
                indicatorData = await response.json();

                // 提取圖表需要的 X 軸與 Y 軸資料
                const dates = indicatorData.map(item => item.date);
                const mnavValues = indicatorData.map(item => item.mnav);
                const mnavPremiums = indicatorData.map(item => item.mnavPremiumPct);
                const btcPrices = indicatorData.map(item => item.btcPrice);
                const formatNumber = (value, digits = 2) => Number(value).toLocaleString('en-US', {
                    minimumFractionDigits: digits,
                    maximumFractionDigits: digits
                });
                const formatSignedLabel = (value, digits = 1, premiumLabel = 'Premium', discountLabel = 'Discount') => {
                    const numericValue = Number(value);
                    const label = numericValue >= 0 ? premiumLabel : discountLabel;
                    return `${label}: ${formatNumber(Math.abs(numericValue), digits)}%`;
                };

                const chartDom = document.getElementById('chart');
                chart = echarts.init(chartDom);

                const chartViews = {
                    mnav: {
                        title: 'mNAV (EV / BTC) + BTC Price',
                        color: '#fa8c16',
                        data: mnavValues,
                        axisName: 'mNAV',
                        axisLabel: '{value}x',
                        legend: 'mNAV (EV / BTC)',
                        btcLegend: 'BTC Price (USD)',
                        formatter: (point) => `
                            <div style="line-height:1.7;">
                                <strong>${point.date}</strong><br>
                                MSTR Price: $${formatNumber(point.mstrPrice)}<br>
                                Enterprise Value: $${formatNumber(point.enterpriseValue)}<br>
                                mNAV (EV / BTC): ${formatNumber(point.mnav, 3)}x<br>
                                → mNAV ${formatSignedLabel(point.mnavPremiumPct, 1)}<br>
                                BTC Price: $${formatNumber(point.btcPrice)}<br>
                                BTC Value: $${formatNumber(point.btcValue)}<br>
                                Official Snapshot As Of: ${point.snapshotAsOfDate ?? 'N/A'}
                            </div>
                        `
                    },
                    mnavPremium: {
                        title: 'mNAV Premium / Discount + BTC Price',
                        color: '#ee6666',
                        data: mnavPremiums,
                        axisName: 'mNAV Premium (%)',
                        axisLabel: '{value} %',
                        legend: 'mNAV Premium / Discount (%)',
                        btcLegend: 'BTC Price (USD)',
                        formatter: (point) => `
                            <div style="line-height:1.7;">
                                <strong>${point.date}</strong><br>
                                MSTR Price: $${formatNumber(point.mstrPrice)}<br>
                                Enterprise Value: $${formatNumber(point.enterpriseValue)}<br>
                                mNAV (EV / BTC): ${formatNumber(point.mnav, 3)}x<br>
                                → mNAV ${formatSignedLabel(point.mnavPremiumPct, 1)}<br>
                                BTC Price: $${formatNumber(point.btcPrice)}<br>
                                BTC Value: $${formatNumber(point.btcValue)}<br>
                                Official Snapshot As Of: ${point.snapshotAsOfDate ?? 'N/A'}
                            </div>
                        `,
                        areaColor: 'rgba(238, 102, 102, 0.1)'
                    }
                };

                const renderChart = (viewKey) => {
                    const view = chartViews[viewKey];
                    chart.setOption({
                        title: {
                            text: view.title,
                            left: 'center',
                            top: 8,
                            textStyle: {
                                fontSize: 15,
                                fontWeight: 600,
                                color: '#1f2937'
                            }
                        },
                        tooltip: {
                            trigger: 'axis',
                            axisPointer: { type: 'cross' },
                            formatter: (params) => view.formatter(indicatorData[params[0].dataIndex])
                        },
                        legend: {
                            data: [view.legend, view.btcLegend],
                            bottom: 0
                        },
                        grid: { left: '8%', right: '8%', top: '16%', bottom: '12%', containLabel: true },
                        xAxis: {
                            type: 'category',
                            boundaryGap: false,
                            data: dates
                        },
                        yAxis: [
                            {
                                type: 'value',
                                name: view.axisName,
                                position: 'left',
                                axisLine: { show: true, lineStyle: { color: view.color } },
                                axisLabel: { formatter: view.axisLabel },
                                scale: true
                            },
                            {
                                type: 'value',
                                name: 'BTC Price',
                                position: 'right',
                                axisLine: { show: true, lineStyle: { color: '#5470c6' } },
                                axisLabel: { formatter: '$ {value}' },
                                scale: true,
                                splitLine: { show: false }
                            }
                        ],
                        series: [
                            {
                                name: view.legend,
                                type: 'line',
                                yAxisIndex: 0,
                                data: view.data,
                                smooth: true,
                                itemStyle: { color: view.color },
                                lineStyle: { width: 3 },
                                areaStyle: view.areaColor ? { color: view.areaColor } : undefined
                            },
                            {
                                name: view.btcLegend,
                                type: 'line',
                                yAxisIndex: 1,
                                data: btcPrices,
                                smooth: true,
                                itemStyle: { color: '#5470c6' },
                                lineStyle: { width: 3 },
                                areaStyle: { color: 'rgba(84, 112, 198, 0.08)' }
                            }
                        ]
                    }, true);
                };

                const toggleButtons = document.querySelectorAll('.chart-toggle');
                toggleButtons.forEach((button) => {
                    button.addEventListener('click', () => {
                        toggleButtons.forEach((item) => item.classList.remove('active'));
                        button.classList.add('active');
                        renderChart(button.dataset.view);
                    });
                });

                renderChart('mnav');

                window.addEventListener('resize', () => {
                    chart.resize();
                });

            } catch (error) {
                console.error("Fetch data error:", error);
                document.getElementById('chart').innerText = '無法載入資料，請確認後端 http://127.0.0.1:8000 是否正在執行。';
                document.getElementById('ai-insight').innerText = '因缺乏數據，無法進行分析。';
                return; // 如果抓不到圖表數據，就中斷執行，不呼叫 AI
            }

            // ==========================================
            // 2. 獲取 AI 分析報告
            // ==========================================
            try {
                // 將抓到的完整數據丟給後端的 AI API
                const insightResponse = await fetch('/api/insights', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(indicatorData)
                });
                
                if (!insightResponse.ok) throw new Error('AI API 回應錯誤');
                
                const insightData = await insightResponse.json();
                
                // 將回傳的分析文字更新到網頁上
                document.getElementById('ai-insight').innerText = insightData.insight;

            } catch (aiError) {
                console.error("AI Insight error:", aiError);
                document.getElementById('ai-insight').innerText = "AI 分析服務暫時無法使用，請確認後端 API 與 Gemini API Key 設定是否正確。";
            }
        }

        // 執行主程式
        fetchAndRenderChart();
    </script>
</body>
</html>
